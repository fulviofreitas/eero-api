# ============================================================================
# 🤖 Auto-Merge Approved PRs
# ============================================================================
# Automatically merges pull requests that are approved and pass all checks.
# Uses the reusable auto-merge action.
#
# How it works:
#   - PRs with the "automerge" label will be merged when ready
#   - PRs are ready when: approved + all required checks pass + up to date
#   - Uses squash merge strategy by default
# ============================================================================

name: 🤖 Auto-Merge

on:
  # Use pull_request_target (not pull_request) so the workflow runs in the
  # base repo's context and has access to secrets — required for fork PRs.
  # Safe here because we don't check out or execute PR head code; the
  # auto-merge action only reads PR metadata (labels, reviews, checks).
  pull_request_target:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
  pull_request_review:
    types:
      - submitted
  check_suite:
    types:
      - completed
  status:

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: 🤖 Auto-Merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip pull_request_review events fired from forks — they don't have
    # access to secrets, so the auto-merge action would fail on auth.
    # The next pull_request_target.synchronize or check_suite.completed
    # event runs in the base repo context and will re-evaluate the PR.
    if: >-
      github.event_name != 'pull_request_review' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🤖 Run automerge
        uses: fulviofreitas/workflow-arsenal/.github/actions/auto-merge@master
        with:
          # Use GitHub App for merging (required for PRs that modify workflow files)
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          app-private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          merge-labels: "automerge"
          blocking-labels: "wip,do-not-merge,needs-review"
          merge-method: "squash"
          required-approvals: "1"
