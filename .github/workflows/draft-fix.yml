# Delegates to the shared reusable workflow in fulviofreitas/workflow-arsenal.
# All draft-fix logic (Claude Code invocation, context repo clone, PR
# creation with two-token pattern, protected-paths revert, step summary)
# lives there — this file owns only the trigger, concurrency, permissions,
# and the `if:` label guard, since those cannot be defined inside a
# reusable workflow.

name: Draft Fix

on:
  issues:
    types: [labeled]

concurrency:
  group: draft-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  draft-fix:
    if: >-
      github.event.label.name == 'try-fix' &&
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.state == 'open'
    uses: fulviofreitas/workflow-arsenal/.github/workflows/agentic-draft-fix.yml@master
    with:
      stack_description: 'async Python 3.12+ SDK and CLI (aiohttp, keyring, Click). Tests: pytest + pytest-asyncio.'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      RENOVATE_APP_ID: ${{ secrets.RENOVATE_APP_ID }}
      RENOVATE_APP_PRIVATE_KEY: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
