# ============================================================================
# 🚀 Automated Semantic Release
# ============================================================================
# Automatically creates releases based on conventional commit messages.
# Uses reusable actions for maintainability.
#
# Chain: CI → Release → Publish TestPyPI → Publish PyPI → Notify Downstream
# Triggers: After CI Pipeline succeeds on main/master
# ============================================================================

name: 🚀 Release

on:
  workflow_run:
    workflows: ["🧪 CI Pipeline"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "🧪 Dry-run mode (no actual release)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # Required for PyPI Trusted Publishing

jobs:
  # ============================================================================
  # 🚀 Semantic Release
  # ============================================================================
  release:
    name: 🚀 Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
      !contains(github.event.workflow_run.head_commit.message, 'chore(release)'))

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: 🚀 Run semantic-release
        id: release
        uses: fulviofreitas/workflow-arsenal/.github/actions/semantic-release@master
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}

  # ============================================================================
  # 📦 Publish to TestPyPI (validation step)
  # ============================================================================
  publish-testpypi:
    name: 📦 Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: release
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/eero-api/

    permissions:
      id-token: write # Required for Trusted Publishing
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: 🏷️ Create dev version
        id: version
        run: |
          DEV_VERSION="${{ needs.release.outputs.version }}.dev0"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT

          # Update pyproject.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"${DEV_VERSION}\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \"[^\"]*\"/__version__ = \"${DEV_VERSION}\"/" src/eero/__init__.py

          echo "📦 TestPyPI version: ${DEV_VERSION}"

      - name: 📦 Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🏗️ Build package
        run: python -m build

      - name: 🔍 Validate package
        run: twine check dist/*

      - name: 📤 Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false
          verbose: true

  # ============================================================================
  # 📦 Publish to PyPI (production)
  # ============================================================================
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release, publish-testpypi]
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/eero-api/

    permissions:
      id-token: write # Required for Trusted Publishing
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: 📦 Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🏗️ Build package
        run: python -m build

      - name: 🔍 Validate package
        run: twine check dist/*

      - name: 📤 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          verbose: true

  # ============================================================================
  # 🔔 Notify Downstream Repositories
  # ============================================================================
  notify-downstream:
    name: 🔔 Notify ${{ matrix.repo }}
    runs-on: ubuntu-latest
    needs: [release]
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'

    strategy:
      fail-fast: false
      matrix:
        repo:
          - eero-ui
          - eero-prometheus-exporter
          - eeroctl

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔔 Notify ${{ matrix.repo }}
        uses: fulviofreitas/workflow-arsenal/.github/actions/notify-downstream@master
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          app-private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          target-repo: ${{ matrix.repo }}
          package: eero-api
          version: ${{ needs.release.outputs.version }}
